        /* ===== STILI ORIGINALI (INVARIATI) ===== */
        * { box-sizing: border-box; }

@keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}
        /* Overlay e pannelli */

        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
.switch input {

    top: 0;
    left: 0;

}        .slider {

/* Evidenziazione per etichette del toggle borders */

// ============================================================

function parseCSV(csvText) {
    const rows = [];
    const lines = csvText.trim().split(/\r?\n/);
    if (lines.length < 2) return rows;
    function parseLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim());
        return result;
    }
    const headers = parseLine(lines[0]);
    for (let i = 1; i < lines.length; i++) {
        const values = parseLine(lines[i]);
        if (values.length === headers.length) {
            const row = {};
            headers.forEach((header, idx) => { row[header] = values[idx]; });
            rows.push(row);
        }
    }
    return rows;
}

function parseNapsCSV(csvText) {
    const rows = [];
    const lines = csvText.trim().split(/\r?\n/);
    if (lines.length < 2) return rows;
    function parseLine(line) {
        const result = [];
        let current = '';
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            const char = line[i];
            if (char === '"') {
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                result.push(current.trim());
                current = '';
            } else {
                current += char;
            }
        }
        result.push(current.trim());
        return result;
    }
    const headers = parseLine(lines[0]);
    for (let i = 1; i < lines.length; i++) {
        const values = parseLine(lines[i]);
        if (values.length === headers.length) {
            const row = {};
            headers.forEach((header, idx) => { row[header] = values[idx]; });
            rows.push(row);
        }
    }
    return rows;
}

async function loadExternalNaps() {
    try {
        const cacheBuster = `?t=${Date.now()}`;
        const response = await fetch(EXTERNAL_NAPS_URL + cacheBuster);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const csvText = await response.text();
        const napsData = parseNapsCSV(csvText);
        externalNapsList = [];
        externalNapsSet.clear();
        for (const row of napsData) {
            const nationACode = row.nazione_A?.trim().toUpperCase();
            const napConStr = row.nap_con?.trim();
            if (!nationACode || !napConStr) continue;
            const countryA = nazioniGlobal.find(n => n.code?.toUpperCase() === nationACode);
            if (!countryA) continue;
            const targets = napConStr.split(',').map(c => c.trim().toUpperCase());
            for (const targetCode of targets) {
                const countryB = nazioniGlobal.find(n => n.code?.toUpperCase() === targetCode);
                if (countryB) {
                    const idA = countryA._id;
                    const idB = countryB._id;
                    const key = `${idA}-${idB}`;
                    const revKey = `${idB}-${idA}`;
                    if (!externalNapsSet.has(key) && !externalNapsSet.has(revKey)) {
                        externalNapsSet.add(key);
                        externalNapsList.push({ fromId: idA, toId: idB, fromName: countryA.name, toName: countryB.name });
                    }
                }
            }
        }
        updateExternalNapsUI();
        renderMap();
        showToast(`${externalNapsList.length} external NAPs loaded`, 'success');
    } catch (error) {
        console.error('Errore NAP esterni:', error);
        showToast('External NAPs unavailable.', 'warning');
    }
}

async function loadExternalBlocs() {
    try {
        showLoading();
        const cacheBuster = `?t=${new Date().getTime()}`;
        const response = await fetch(EXTERNAL_BLOCS_URL + cacheBuster);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const csvText = await response.text();
        const blocsData = parseCSV(csvText);
        buildBlocMapFromData(blocsData);

    }
}

function buildBlocMapFromData(blocsData) {
    blocColorMap.clear();
    multiBlocMap.clear();
    externalBlocsInfo = [];
    if (!blocsData || blocsData.length === 0) blocsData = getHardcodedBlocsData();
    for (const bloc of blocsData) {
        const blocName = bloc.nome_blocco;
        const blocColor = bloc.colore;
        const labelLng = parseFloat(bloc.label_lng);
        const labelLat = parseFloat(bloc.label_lat);
        if (!blocColor) continue;
        externalBlocsInfo.push({
            name: blocName,
            color: blocColor,
            labelLng: isNaN(labelLng) ? null : labelLng,
            labelLat: isNaN(labelLat) ? null : labelLat
        });
        const countryCodes = bloc.codici_nazioni.split(',').map(c => c.trim().toUpperCase());
        for (const code of countryCodes) {
            const country = nazioniGlobal.find(n => n.code?.toUpperCase() === code);
            if (country) {
                const countryId = country._id;
                if (blocColorMap.has(countryId)) {
                    let existingColors = [blocColorMap.get(countryId)];
                    const existingMulti = multiBlocMap.get(countryId);
                    if (existingMulti) existingColors = existingMulti.colors;
                    const newColors = [...existingColors, blocColor];
                    const patternKey = `stripe-${newColors.join('-')}`;
                    multiBlocMap.set(countryId, { colors: newColors, patternKey });
                } else {
                    blocColorMap.set(countryId, blocColor);
                }
            }
        }
    }
}

function getOriginalBordersMesh(topoData) {

            if (geom.properties && geom.properties.initialCountryId) {
                geom.properties.countryId = geom.properties.initialCountryId;
            }
        });
    }
    const mesh = topojson.mesh(cloned, cloned.objects.regions, (a, b) => a !== b && a.properties.countryId !== b.properties.countryId);
    return mesh;
}

function createBlendPattern(colors, sz = 2048) {
    const canvas = document.createElement('canvas');
    canvas.width = sz;
    canvas.height = sz;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, sz, sz);
    const step = 1 / (colors.length - 1);
    colors.forEach((color, idx) => { gradient.addColorStop(idx * step, color); });
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, sz, sz);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(0, 0, sz, sz);
    return canvas;
}

function createAndAddStripePatterns() {
    const seen = new Set();
    multiBlocMap.forEach(({ colors, patternKey }) => {
        if (seen.has(patternKey)) return;
        seen.add(patternKey);
        const canvas = createBlendPattern(colors, 8);
        const img = new Image();
        img.onload = () => {
            if (!map.hasImage(patternKey)) {
                map.addImage(patternKey, img);
                if (map.getLayer(LYR_MULTI_BLOC)) map.triggerRepaint();
            }
        };
        img.src = canvas.toDataURL();
    });
}

function buildMultiBlocPatternExpression() {
    const entries = [...multiBlocMap.entries()];
    if (entries.length === 0) return '';
    const expr = ['match', ['get', 'countryId']];
    entries.forEach(([id, { patternKey }]) => expr.push(id, patternKey));
    expr.push(entries[0][1].patternKey);
    return expr;
}

function getIndirectAllies(targetId) {
    const target = nationMap.get(targetId);
    if (!target || !target.allies) return [];
    const indirect = new Set();
    target.allies.forEach(allyId => {
        const ally = nationMap.get(allyId);
        if (ally && ally.allies) {
            ally.allies.forEach(id => { if (id !== targetId && !target.allies.includes(id)) indirect.add(id); });
        }
    });
    return Array.from(indirect);
}

function getEnemyAllies(targetId) {
    const target = nationMap.get(targetId);
    if (!target || !target.warsWith) return [];
    const enemyAllies = new Set();
    target.warsWith.forEach(enemyId => {
        const enemy = nationMap.get(enemyId);
        if (enemy && enemy.allies) {
            enemy.allies.forEach(id => { if (id !== targetId) enemyAllies.add(id); });
        }
    });
    return Array.from(enemyAllies);
}

function getColorForCountry(cId, directWars, directAllies, indirectAllies, enemyAllies, styleMap, isExtended) {
    const isManualNap = customNaps.includes(cId);
    const excludeExternalNaps = document.getElementById('checkExcludeExternalNaps')?.checked || false;
    let isExternalNap = false;
    if (!excludeExternalNaps && selectedCountryId) {
        isExternalNap = externalNapsSet.has(`${selectedCountryId}-${cId}`) || externalNapsSet.has(`${cId}-${selectedCountryId}`);
    }
    const isNap = isManualNap || isExternalNap;
    if (!selectedCountryId) return styleMap[cId] || COLORS.NEUTRAL_UNSELECTED;
    if (cId === selectedCountryId) return COLORS.SELECTED;
    if (isNap) return COLORS.NAP;
    if (directAllies.includes(cId)) return COLORS.ALLY_DIRECT;
    if (directWars.includes(cId)) return COLORS.WAR_DIRECT;
    if (enemyAllies.includes(cId) && indirectAllies.includes(cId) && isExtended) return COLORS.BORDERLINE;
    if (enemyAllies.includes(cId)) return COLORS.WAR_INDIRECT;
    if (indirectAllies.includes(cId) && isExtended) return COLORS.ALLY_INDIRECT;
    return COLORS.DEFAULT_LAND;
}

function buildDiplomacyColorExpression(directWars, directAllies, indirectAllies, enemyAllies, styleMap, isExtended) {
    const expr = ['match', ['get', 'countryId']];
    const allIds = new Set([...Object.keys(styleMap), ...directWars, ...directAllies, ...indirectAllies, ...enemyAllies, ...customNaps, ...(selectedCountryId ? [selectedCountryId] : [])]);
    allIds.forEach(cId => {
        const color = getColorForCountry(cId, directWars, directAllies, indirectAllies, enemyAllies, styleMap, isExtended);
        expr.push(cId, color);
    });
    expr.push(selectedCountryId ? COLORS.DEFAULT_LAND : COLORS.NEUTRAL_UNSELECTED);
    return expr;
}

function buildBlocColorExpression() {
    const expr = ['match', ['get', 'countryId']];
    for (let [id, color] of blocColorMap.entries()) { if (!multiBlocMap.has(id)) expr.push(id, color); }
    expr.push(COLORS.DEFAULT_LAND);
    return expr;
}

function buildOriginalBlocColorExpression() {
    const expr = ['match', ['to-string', ['get', 'initialCountryId']]];
    for (let [id, color] of blocColorMap.entries()) { if (!multiBlocMap.has(id)) expr.push(id, color); }
    for (let [id, { colors }] of multiBlocMap.entries()) expr.push(id, colors[0]);
    expr.push(COLORS.DEFAULT_LAND);
    return expr;
}

function buildOriginalColorExpression(directWars, directAllies, indirectAllies, enemyAllies, isExtended) {
    const colorMap = new Map();
    const excludeExternalNaps = document.getElementById('checkExcludeExternalNaps')?.checked || false;
    nazioniGlobal.forEach(n => {
        const id = n._id;
        let color;
        if (!selectedCountryId) color = nationBaseColorMap.get(id) || COLORS.DEFAULT_LAND;
        else if (id === selectedCountryId) color = COLORS.SELECTED;
        else if (customNaps.includes(id)) color = COLORS.NAP;
        else if (!excludeExternalNaps && (externalNapsSet.has(`${selectedCountryId}-${id}`) || externalNapsSet.has(`${id}-${selectedCountryId}`))) color = COLORS.NAP;
        else if (directAllies.includes(id)) color = COLORS.ALLY_DIRECT;
        else if (directWars.includes(id)) color = COLORS.WAR_DIRECT;
        else if (enemyAllies.includes(id) && indirectAllies.includes(id) && isExtended) color = COLORS.BORDERLINE;
        else if (enemyAllies.includes(id)) color = COLORS.WAR_INDIRECT;
        else if (indirectAllies.includes(id) && isExtended) color = COLORS.ALLY_INDIRECT;
        else color = COLORS.DEFAULT_LAND;
        colorMap.set(id, color);
    });
    const expr = ['match', ['to-string', ['get', 'initialCountryId']]];
    for (let [id, color] of colorMap.entries()) expr.push(id.toString(), color);
    expr.push(COLORS.NEUTRAL_UNSELECTED);
    return expr;
}

function flattenCoords(geometry) {
    const result = [];
    function extract(c) { if (!c) return; if (typeof c[0] === 'number') result.push(c); else c.forEach(extract); }
    extract(geometry.coordinates);
    return result;
}

function buildOriginalLabels() {
    if (!baseGeoJSON || !labelsData.length) return;
    const regionIndex = [];
    baseGeoJSON.features.forEach(f => {
        const initId = f.properties?.initialCountryId;
        if (!initId) return;
        const coords = flattenCoords(f.geometry);
        if (!coords.length) return;
        let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
        coords.forEach(c => { minLng = Math.min(minLng, c[0]); maxLng = Math.max(maxLng, c[0]); minLat = Math.min(minLat, c[1]); maxLat = Math.max(maxLat, c[1]); });
        regionIndex.push({ initId, minLng, maxLng, minLat, maxLat, geometry: f.geometry, numCoords: coords.length });
    });
    function pointInPolygon(point, polygon) {
        const x = point[0], y = point[1];
        let inside = false;
        function processRing(ring) {
            for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
                const intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
        }
        if (polygon.type === 'Polygon') processRing(polygon.coordinates[0]);
        else if (polygon.type === 'MultiPolygon') polygon.coordinates.forEach(poly => processRing(poly[0]));
        return inside;
    }
    const capitalMap = new Map();
    labelsData.forEach(label => {
        const coords = label.coordinates;
        if (!coords) return;
        for (let region of regionIndex) {
            if (coords[0] >= region.minLng && coords[0] <= region.maxLng && coords[1] >= region.minLat && coords[1] <= region.maxLat) {
                if (pointInPolygon(coords, region.geometry)) {
                    const existing = capitalMap.get(region.initId);
                    const flagSize = label.properties.flagSize || 0;
                    if (!existing || flagSize > (existing.flagSize || 0)) {
                        capitalMap.set(region.initId, { coordinates: coords, flagSize, label });
                    }
                    break;
                }
            }
        }
    });
    const centroidMap = new Map();
    regionIndex.forEach(region => {
        if (capitalMap.has(region.initId)) return;
        const best = centroidMap.get(region.initId);
        if (!best || region.numCoords > best.numCoords) {
            const coords = flattenCoords(region.geometry);
            let sumLng = 0, sumLat = 0;
            coords.forEach(c => { sumLng += c[0]; sumLat += c[1]; });
            const center = [sumLng / coords.length, sumLat / coords.length];
            centroidMap.set(region.initId, { center, numCoords: region.numCoords });
        }
    });
    originalLabelsData = [];
    capitalMap.forEach((data, initId) => {
        const nation = nationMap.get(initId);
        const label = data.label;
        originalLabelsData.push({
            coordinates: data.coordinates,
            properties: {
                countryId: initId,
                countryName: nation ? nation.name : label.properties.countryName,
                countryCode: nation ? (nation.code || '').toLowerCase() : (label.properties.countryCode || '').toLowerCase(),
                flagSize: label.properties.flagSize,
                textSize: label.properties.textSize,
                textColor: label.properties.textColor,
                strokeColor: nationBaseColorMap.get(initId) || COLORS.DEFAULT_LAND
            }
        });
    });
    centroidMap.forEach((data, initId) => {
        const nation = nationMap.get(initId);
        if (!nation) return;
        originalLabelsData.push({
            coordinates: data.center,
            properties: {
                countryId: initId,
                countryName: nation.name,
                countryCode: (nation.code || '').toLowerCase(),
                flagSize: 0.2,
                textSize: 10,
                textColor: '#cccccc',
                strokeColor: nationBaseColorMap.get(initId) || COLORS.DEFAULT_LAND
            }
        });
    });
}

function hashColor(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) + str.charCodeAt(i);
    const hue = Math.abs(h) % 360;
    return `hsl(${hue}, 45%, 32%)`;
}

            labelActual.classList.add('active');
            labelOriginal.classList.remove('active');
        }
    }
    
    setColoringMode(coloringMode);
}

// ============================================================
// RENDER MAPPA
// ============================================================
function renderMap() {
    if (!map || !mapDataGlobal) return;
    updateDynamicLegend();
    updateStats();
    updateSelectedDisplay();

    const borderLayer = map.getLayer(LYR_BORDER);
    const originalBorderLayer = map.getLayer('original-borders-line');
    if (mapSource === 'original') {
        if (borderLayer) map.setLayoutProperty(LYR_BORDER, 'visibility', 'none');
        if (originalBorderLayer) map.setLayoutProperty('original-borders-line', 'visibility', 'visible');
    } else {
        if (borderLayer) map.setLayoutProperty(LYR_BORDER, 'visibility', 'visible');
        if (originalBorderLayer) map.setLayoutProperty('original-borders-line', 'visibility', 'none');
    }

    if (map.getLayer(LYR_MULTI_BLOC)) {
        if (coloringMode === 'blocs') {
            const multiIds = [...multiBlocMap.keys()];
            if (multiIds.length > 0) {
                map.setFilter(LYR_MULTI_BLOC, ['in', ['get', 'countryId'], ['literal', multiIds]]);
                map.setPaintProperty(LYR_MULTI_BLOC, 'fill-pattern', buildMultiBlocPatternExpression());
            }
            map.setLayoutProperty(LYR_MULTI_BLOC, 'visibility', multiIds.length > 0 ? 'visible' : 'none');
        } else {
            map.setLayoutProperty(LYR_MULTI_BLOC, 'visibility', 'none');
        }
    }

    const isExtended = document.getElementById('checkExtended').checked;
    let directWars = [], directAllies = [], indirectAllies = [], enemyAllies = [];
    if (coloringMode === 'diplomacy' && selectedCountryId) {
        const target = nationMap.get(selectedCountryId);
        if (target) {
            directWars = target.warsWith || [];
            directAllies = target.allies || [];
            indirectAllies = getIndirectAllies(selectedCountryId);
            enemyAllies = getEnemyAllies(selectedCountryId);
        }
    }

    let fillExpr;
    if (coloringMode === 'blocs') {
        fillExpr = mapSource === 'actual' ? buildBlocColorExpression() : buildOriginalBlocColorExpression();
    } else {
        if (mapSource === 'actual') {
            const styleMap = {};
            labelsData.forEach(l => { if (l.properties?.countryId) styleMap[l.properties.countryId] = l.properties.strokeColor; });
            fillExpr = buildDiplomacyColorExpression(directWars, directAllies, indirectAllies, enemyAllies, styleMap, isExtended);
        } else {
            fillExpr = buildOriginalColorExpression(directWars, directAllies, indirectAllies, enemyAllies, isExtended);
        }
    }

    if (map.getLayer(LYR_FILL)) {
        map.setPaintProperty(LYR_FILL, 'fill-color', fillExpr);
        map.setPaintProperty(LYR_FILL, 'fill-opacity', 0.9);
    }

    toggleLabels();
    if (labelCanvas) map.triggerRepaint();
}

// ============================================================
// CANVAS LABELS (INVARIATO)
// ============================================================
let labelCanvas = null;
let labelCtx = null;
const flagImageCache = new Map();

function initLabelCanvas() {
    labelCanvas = document.createElement('canvas');
    labelCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:500;';
    map.getContainer().appendChild(labelCanvas);
    labelCtx = labelCanvas.getContext('2d');
    resizeLabelCanvas();
    map.on('render', drawLabels);
    window.addEventListener('resize', resizeLabelCanvas);
}

function resizeLabelCanvas() {
    if (!labelCanvas) return;
    const container = map.getContainer();
    const r = window.devicePixelRatio || 1;
    labelCanvas.width = container.clientWidth * r;
    labelCanvas.height = container.clientHeight * r;
    labelCanvas.style.width = container.clientWidth + 'px';
    labelCanvas.style.height = container.clientHeight + 'px';
    labelCtx.scale(r, r);
}

function toggleLabels() { if (labelCanvas) map.triggerRepaint(); }

function shouldShowBlocLabels() { return coloringMode === 'blocs'; }

function drawAndCollectBlocLabels(ctx, W, H) {
    const blocBBoxes = [];
    if (!externalBlocsInfo.length) return blocBBoxes;
    const zoom = map.getZoom();
    const fontSize = Math.max(20, Math.min(40, 24 * (1 + (zoom - 2) * 0.2)));
    ctx.font = `bold ${fontSize}px "JetBrains Mono", monospace`;
    const BLOC_MARGIN = 30;
    for (const bloc of externalBlocsInfo) {
        if (bloc.labelLng === null || bloc.labelLat === null) continue;
        const pt = map.project([bloc.labelLng, bloc.labelLat]);
        if (pt.x >= -100 && pt.x <= W + 100 && pt.y >= -60 && pt.y <= H + 60) {
            const metrics = ctx.measureText(bloc.name);
            blocBBoxes.push({
                xMin: pt.x - metrics.width/2 - BLOC_MARGIN,
                xMax: pt.x + metrics.width/2 + BLOC_MARGIN,
                yMin: pt.y - fontSize/2 - BLOC_MARGIN,
                yMax: pt.y + fontSize/2 + BLOC_MARGIN
            });
            ctx.shadowColor = '#000'; ctx.shadowBlur = 8;
            ctx.strokeStyle = '#000'; ctx.lineWidth = 4;
            ctx.strokeText(bloc.name, pt.x, pt.y);
            ctx.shadowBlur = 0;
            ctx.fillStyle = bloc.color;
            ctx.fillText(bloc.name, pt.x, pt.y);
        }
    }
    return blocBBoxes;
}

function drawLabels() {
    if (!labelCanvas || !labelCtx || !labelsData.length) return;
    const showNations = document.getElementById('checkLabels').checked;
    const W = labelCanvas.width / (window.devicePixelRatio || 1);
    const H = labelCanvas.height / (window.devicePixelRatio || 1);
    const ctx = labelCtx;
    ctx.save();
    ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
    ctx.clearRect(0, 0, W, H);

    let blocBBoxes = [];
    if (shouldShowBlocLabels()) blocBBoxes = drawAndCollectBlocLabels(ctx, W, H);
    if (!showNations) { ctx.restore(); return; }

    const zoom = map.getZoom();
    const sourceLabels = mapSource === 'original' ? originalLabelsData : labelsData;
    const sorted = [...sourceLabels].sort((a, b) => (b.properties.flagSize || 0) - (a.properties.flagSize || 0));
    const drawnNationBoxes = [];

    function intersects(b1, b2) {
        return !(b2.xMin > b1.xMax || b2.xMax < b1.xMin || b2.yMin > b1.yMax || b2.yMax < b1.yMin);
    }

    sorted.forEach(label => {
        const props = label.properties;
        const coords = label.coordinates;
        if (!coords) return;
        if (zoom < 2.5 && props.flagSize < 0.15) return;
        if (zoom < 3.5 && props.flagSize < 0.08) return;
        const pt = map.project([coords[0], coords[1]]);
        if (pt.x < -100 || pt.x > W + 100 || pt.y < -60 || pt.y > H + 60) return;

        const nameStr = props.countryName?.toUpperCase() || '';
        const baseSize = props.textSize || 10;
        let scale = 1.0;
        if (zoom < 2.5) scale = 1.4;
        else if (zoom < 3) scale = 1.3;
        else if (zoom < 4) scale = 1.2;
        else if (zoom < 5) scale = 1.0;
        else scale = 0.9;
        const fontSize = Math.round(baseSize * scale);
        ctx.font = `bold ${fontSize}px "JetBrains Mono", monospace`;
        const textWidth = ctx.measureText(nameStr).width;
        const nationBox = {
            xMin: pt.x - textWidth/2 - 1,
            xMax: pt.x + textWidth/2 + 1,
            yMin: pt.y - fontSize/2 - 1,
            yMax: pt.y + fontSize/2 + 1
        };
        if (shouldShowBlocLabels() && blocBBoxes.some(b => intersects(nationBox, b))) return;
        if (drawnNationBoxes.some(b => intersects(nationBox, b))) return;
        drawnNationBoxes.push(nationBox);

        const code = (props.countryCode || '').toLowerCase();
        const flagW = Math.round(16 * (zoom < 3 ? 1.5 : zoom < 4 ? 1.3 : zoom < 5 ? 1.1 : 1.0));
        const flagH = Math.round(11 * (zoom < 3 ? 1.5 : zoom < 4 ? 1.3 : zoom < 5 ? 1.1 : 1.0));
        const cachedFlag = flagImageCache.get(code);
        const totalH = (cachedFlag ? flagH + 2 : 0) + fontSize;
        const startY = pt.y - totalH/2;
        if (cachedFlag) ctx.drawImage(cachedFlag, pt.x - flagW/2, startY, flagW, flagH);

        let textColor;
        const cId = props.countryId;
        if (coloringMode === 'blocs') textColor = blocColorMap.get(cId) || '#cccccc';
        else if (mapSource === 'original') textColor = selectedCountryId ? '#ffffff' : (props.textColor || '#cccccc');
        else textColor = selectedCountryId ? '#ffffff' : (props.textColor || '#cccccc');

        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        const textY = startY + (cachedFlag ? flagH + 2 : 0);
        ctx.shadowColor = '#000'; ctx.shadowBlur = 4;
        ctx.strokeStyle = '#000'; ctx.lineWidth = 3;
        ctx.strokeText(nameStr, pt.x, textY);
        ctx.shadowBlur = 0;
        ctx.fillStyle = textColor;
        ctx.fillText(nameStr, pt.x, textY);
    });
    ctx.restore();
}

function loadFlagImage(code) {
    if (!code || flagImageCache.has(code)) return;
    flagImageCache.set(code, null);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { flagImageCache.set(code, img); if (map) map.triggerRepaint(); };
    img.onerror = () => flagImageCache.set(code, null);
    img.src = `https://app.warera.io/images/map/${code}.png?v=21`;
}

function preloadAllFlags() {
    labelsData.forEach(l => { const c = l.properties?.countryCode?.toLowerCase(); if(c) loadFlagImage(c); });
}

// ============================================================
// SETUP MAPPA
// ============================================================
function setupMapLayers() {
    const topoData = mapDataGlobal.map;
    baseGeoJSON = topojson.feature(topoData, topoData.objects.regions);
    labelsData = mapDataGlobal.countryLabels?.geometries || topoData.objects.countryLabels?.geometries || [];

    if (!map.getSource(SRC_REGIONS)) map.addSource(SRC_REGIONS, { type: 'geojson', data: baseGeoJSON });
    else map.getSource(SRC_REGIONS).setData(baseGeoJSON);

    const bordersMesh = topojson.mesh(topoData, topoData.objects.regions, (a, b) => a !== b && a.properties.countryId !== b.properties.countryId);
    const coastMesh = topojson.mesh(topoData, topoData.objects.regions, (a, b) => a === b);
    const regionsMesh = topojson.mesh(topoData, topoData.objects.regions, (a, b) => a !== b && a.properties.countryId === b.properties.countryId);

    if (!map.getSource(SRC_BORDERS)) {
        map.addSource(SRC_BORDERS, {
            type: 'geojson',
            data: {
                type: 'FeatureCollection',
                features: [
                    { type: 'Feature', properties: { kind: 'border' }, geometry: bordersMesh },
                    { type: 'Feature', properties: { kind: 'coast'  }, geometry: coastMesh   },
                    { type: 'Feature', properties: { kind: 'region' }, geometry: regionsMesh }
                ]
            }
        });
    }

    const labelsGeoJSON = {
        type: 'FeatureCollection',
        features: labelsData.map(l => ({ type: 'Feature', geometry: { type: 'Point', coordinates: l.coordinates }, properties: l.properties }))
    };
    if (!map.getSource(SRC_LABELS)) map.addSource(SRC_LABELS, { type: 'geojson', data: labelsGeoJSON });
    else map.getSource(SRC_LABELS).setData(labelsGeoJSON);

    if (!map.getLayer(LYR_FILL)) {
        map.addLayer({
            id: LYR_FILL,
            type: 'fill',
            source: SRC_REGIONS,
            paint: { 'fill-color': COLORS.NEUTRAL_UNSELECTED, 'fill-opacity': 0.9 }
        });
    }

    const originalBordersMesh = getOriginalBordersMesh(topoData);
    if (!map.getSource('original-borders-src')) {
        map.addSource('original-borders-src', { type: 'geojson', data: originalBordersMesh });
        map.addLayer({
            id: 'original-borders-line',
            type: 'line',
            source: 'original-borders-src',
            paint: { 'line-color': '#ffffff', 'line-width': 2, 'line-opacity': 0.9 },
            layout: { visibility: 'none' }
        });
    }

    createAndAddStripePatterns();
    if (!map.getLayer(LYR_MULTI_BLOC)) {
        const multiIds = [...multiBlocMap.keys()];
        map.addLayer({
            id: LYR_MULTI_BLOC,
            type: 'fill',
            source: SRC_REGIONS,
            filter: multiIds.length ? ['in', ['get', 'countryId'], ['literal', multiIds]] : ['==', ['get', 'countryId'], '___none___'],
            layout: { visibility: 'none' },
            paint: { 'fill-opacity': 0.92 }
        });
        if (multiIds.length) map.setPaintProperty(LYR_MULTI_BLOC, 'fill-pattern', buildMultiBlocPatternExpression());
    }

    if (!map.getLayer(LYR_COAST)) {
        map.addLayer({
            id: LYR_COAST,
            type: 'line',
            source: SRC_BORDERS,
            filter: ['==', ['get', 'kind'], 'coast'],
            paint: { 'line-color': '#ffffff', 'line-width': 0.8, 'line-opacity': 0.9 }
        });
    }
    if (!map.getLayer(LYR_BORDER)) {
        map.addLayer({
            id: LYR_BORDER,
            type: 'line',
            source: SRC_BORDERS,
            filter: ['==', ['get', 'kind'], 'border'],
            paint: { 'line-color': '#ffffff', 'line-width': 0.8, 'line-opacity': 0.8 }
        });
    }
    if (!map.getLayer(LYR_OUTLINE)) {
        map.addLayer({
            id: LYR_OUTLINE,
            type: 'line',
            source: SRC_BORDERS,
            filter: ['==', ['get', 'kind'], 'region'],
            paint: { 'line-color': '#000000', 'line-width': 0.8, 'line-opacity': 0.7 }
        });
    }
    if (map.getLayer(LYR_OUTLINE) && map.getLayer(LYR_BORDER)) map.moveLayer(LYR_OUTLINE, LYR_BORDER);

    initLabelCanvas();
    preloadAllFlags();

    map.off('click', LYR_FILL, onRegionClick);
    map.on('click', LYR_FILL, onRegionClick);
    map.on('mouseenter', LYR_FILL, () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', LYR_FILL, () => map.getCanvas().style.cursor = '');

    renderMap();
}

function onRegionClick(e) {
    if (!e.features?.length) return;
    let cId = mapSource === 'original' ? e.features[0].properties.initialCountryId : e.features[0].properties.countryId;
    selectedCountryId = (selectedCountryId === cId) ? null : cId;
    renderMap();
    if (window.umami && selectedCountryId) {
        const nation = nationMap.get(selectedCountryId);
        if (nation) umami.track('nation-click', { nation: nation.name });
    }
}

// ============================================================
// INIZIALIZZAZIONE DATI
// ============================================================
async function init() {
    map = new maplibregl.Map({
        container: 'map',
        style: { version: 8, glyphs: 'https://protomaps.github.io/basemaps-assets/fonts/{fontstack}/{range}.pbf', sources: {}, layers: [{ id: 'background', type: 'background', paint: { 'background-color': COLORS.OCEAN } }] },
        center: [0, 20],
        zoom: 2,
        minZoom: 1.7,
        maxZoom: 8,
        renderWorldCopies: true,
        attributionControl: false
    });
    // RIMOSSO il controllo zoom +/- (NavigationControl)
    map.on('load', async () => { await refreshData(); });
}

async function refreshData() {
    try {
        showLoading();
        const [resN, resM] = await Promise.all([
            fetch('https://api2.warera.io/trpc/country.getAllCountries'),
            fetch('https://api4.warera.io/trpc/map.getMapData')
        ]);
        if (!resN.ok || !resM.ok) throw new Error('Failed to fetch data');
        const nationsData = await resN.json();
        const mapData = await resM.json();
        nazioniGlobal = nationsData.result.data;
        mapDataGlobal = mapData.result.data;
        nationMap.clear();
        nazioniGlobal.forEach(n => nationMap.set(n._id, n));
        await loadExternalBlocs();
        await loadExternalNaps();
        popolaListe();
        setupMapLayers();

        nationBaseColorMap.clear();
        labelsData.forEach(label => { if (label.properties?.countryId) nationBaseColorMap.set(label.properties.countryId, label.properties.strokeColor); });
        nazioniGlobal.forEach(n => { if (!nationBaseColorMap.has(n._id)) nationBaseColorMap.set(n._id, n.color || hashColor(n._id)); });
        buildOriginalLabels();
        originalLabelsData.forEach(l => { const c = l.properties?.countryCode?.toLowerCase(); if (c) loadFlagImage(c); });
        updateExternalNapsUI();
        syncUIToState(); // imposta il toggle borders e i bottoni attivi
        showToast('Strategic data loaded', 'success');
    } catch (e) {
        console.error(e);
        showToast('Failed to load game data', 'error');
    } finally {
        hideLoading();
    }
}

function popolaListe() {
    const datalist = document.getElementById('nazioniList');
    datalist.innerHTML = '';
    [...nazioniGlobal].sort((a,b) => a.name.localeCompare(b.name)).forEach(n => {
        datalist.appendChild(new Option(n.name));
    });
}

// ============================================================
// GESTIONE NAP (MANUALI)
// ============================================================
function aggiungiNap() {
    const input = document.getElementById('napInput');
    const val = input.value.trim();
    if (!val) { showToast('Enter a nation name', 'error'); return; }
    const found = nazioniGlobal.find(n => n.name.toLowerCase() === val.toLowerCase());
    if (!found) { showToast(`Nation "${val}" not found`, 'error'); return; }
    if (customNaps.includes(found._id)) { showToast(`${found.name} already in NAP`, 'error'); return; }
    if (selectedCountryId && found._id === selectedCountryId) { showToast('Cannot add selected nation', 'error'); return; }
    customNaps.push(found._id);
    input.value = '';
    aggiornaListaNap();
    renderMap();
    showToast(`Added ${found.name} to NAP`, 'success');
}

function rimuoviNap(id) {
    customNaps = customNaps.filter(n => n !== id);
    aggiornaListaNap();
    renderMap();
}

function aggiornaListaNap() {
    const container = document.getElementById('napList');
    const badge = document.getElementById('nap-count');
    badge.textContent = customNaps.length;
    if (!customNaps.length) {
        container.innerHTML = '<div class="empty-state">No manual NAPs set</div>';
        return;
    }
    container.innerHTML = '';
    customNaps.forEach(id => {
        const n = nationMap.get(id);
        if (n) {
            container.innerHTML += `<div class="nap-item"><span style="font-weight:600">${n.name}</span><span class="remove-nap" onclick="rimuoviNap('${id}')">✕</span></div>`;
        }
    });
}

function updateExternalNapsUI() {
    const container = document.getElementById('externalNapList');
    if (!externalNapsList.length) {
        container.innerHTML = '<div class="empty-state">No external NAPs loaded</div>';
        return;
    }
    const grouped = new Map();
    externalNapsList.forEach(nap => {
        if (!grouped.has(nap.fromId)) grouped.set(nap.fromId, []);
        grouped.get(nap.fromId).push(nap.toName);
    });
    let html = '';
    for (let [fromId, toNames] of grouped) {
        const from = nationMap.get(fromId);
        if (from) html += `<div class="nap-item" style="border-left-color:#55a5d9;"><span>${from.name}</span><span style="color:#aaa;">→ ${toNames.join(', ')}</span></div>`;
    }
    container.innerHTML = html;
}

// ============================================================
// RICERCA E RESET
// ============================================================
function cercaNazione() {
    const input = document.getElementById('cercaInput');
    const val = input.value.toLowerCase().trim();
    if (!val) { showToast('Enter a name', 'error'); return; }
    const found = nazioniGlobal.find(n => n.name.toLowerCase() === val) || nazioniGlobal.find(n => n.name.toLowerCase().includes(val));
    if (found) {
        selectedCountryId = found._id;
        input.value = found.name;
        renderMap();
        const label = labelsData.find(l => l.properties?.countryId === found._id);
        if (label) map.flyTo({ center: label.coordinates, zoom: Math.max(map.getZoom(), 3) });
        if (window.innerWidth <= 768) document.getElementById('dynamic-legend').classList.add('hidden');
    } else {
        showToast(`Nation "${val}" not found`, 'error');
    }
}

function resetDiplomazia() {
    selectedCountryId = null;
    customNaps = [];
    document.getElementById('cercaInput').value = '';
    document.getElementById('checkExtended').checked = false;
    document.getElementById('napInput').value = '';
    document.getElementById('checkExcludeExternalNaps').checked = false;
    setMapSource(false); // actual
    setColoringMode('diplomacy');
    aggiornaListaNap();
    renderMap();
}

function toggleStatsDetails() {
    const name = document.getElementById('selected-name-display').textContent || 'No selection';
    const allies = document.getElementById('stats-allies').textContent;
    const wars = document.getElementById('stats-wars').textContent;
    const naps = document.getElementById('stats-naps').textContent;
    showToast(`${name} | Allies: ${allies} | Wars: ${wars} | NAPs: ${naps}`, 'info');
}

// ============================================================
// GESTIONE HAMBURGER MENU
// ============================================================
function toggleHamburgerMenu() {
    document.getElementById('hamburger-menu').classList.toggle('visible');
}

document.addEventListener('click', (e) => {
    const btn = document.getElementById('hamburger-btn');
    const menu = document.getElementById('hamburger-menu');
    if (!btn.contains(e.target) && !menu.contains(e.target)) {
        menu.classList.remove('visible');
    }
});

// ============================================================
// AVVIO
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('cercaInput').addEventListener('keypress', e => { if (e.key === 'Enter') cercaNazione(); });
    document.getElementById('napInput').addEventListener('keypress', e => { if (e.key === 'Enter') aggiungiNap(); });
    document.getElementById('hamburger-btn').addEventListener('click', toggleHamburgerMenu);
    
    // Listener per il toggle Actual/Original Borders
    const toggleBorders = document.getElementById('toggle-borders');
    if (toggleBorders) {
        toggleBorders.addEventListener('change', function(e) {
            setMapSource(this.checked);
        });
    }
});

window.onload = init;
</script>
