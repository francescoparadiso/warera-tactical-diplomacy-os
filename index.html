<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WarEra Diplomacy OS - MapLibre</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        /* tutti gli stili originali invariati */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #map {
            height: 100vh;
            width: 100vw;
        }

        /* Loading */
        #loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.92);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s;
        }
        .loader { text-align: center; color: #00d4ff; }
        .loader-spinner {
            width: 50px; height: 50px;
            border: 3px solid #333;
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Toast */
        #toast-container {
            position: fixed;
            bottom: 110px; right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast {
            background: rgba(20,20,20,0.95);
            border-left: 4px solid #00d4ff;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
            max-width: 300px;
        }
        .toast.error { border-left-color: #ff4747; }
        .toast.success { border-left-color: #2ecc71; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

/* Panels - collassabili su tutte le dimensioni (desktop e mobile) */
.overlay { position: absolute; z-index: 1000; pointer-events: none; width: auto; }
.panel {
    background: rgba(10,10,10,0.95);
    border: 1px solid #333;
    padding: 16px;
    border-radius: 12px;
    pointer-events: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
}
#top-left { top: 20px; left: 20px; width: 340px; }
#top-right { top: 20px; right: 20px; width: 320px; }
#legend-container { bottom: 30px; left: 20px; }
#stats-bar { bottom: 30px; right: 20px; pointer-events: none; }

.stats-content { display: flex; gap: 15px; font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-item { display: flex; flex-direction: column; align-items: center; }
.stat-value { font-size: 18px; font-weight: bold; color: #00d4ff; }

.panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
}
.panel-content {
    transition: max-height 0.3s ease, opacity 0.3s ease, margin 0.3s ease;
    overflow: hidden;
}
.panel-content.collapsed {
    max-height: 0 !important;
    opacity: 0;
    margin-top: 0 !important;
    pointer-events: none;
}
.collapse-icon {
    font-size: 18px;
    color: #00d4ff;
    transition: transform 0.3s;
    cursor: pointer;
}
.collapse-icon.collapsed {
    transform: rotate(-90deg);
}

        #stats-chip {
            display: none;
            background: rgba(10,10,10,0.95);
            border: 1px solid #333;
            border-radius: 30px;
            padding: 8px 16px;
            backdrop-filter: blur(10px);
            pointer-events: auto;
            cursor: pointer;
        }
        .stats-chip-content { display: flex; gap: 20px; font-size: 12px; }
        .stats-chip-item { display: flex; align-items: center; gap: 6px; }
        .stats-chip-value { color: #00d4ff; font-weight: bold; }

        @media (max-width: 768px) {
            #top-left, #top-right { left: 10px; right: 10px; width: calc(100% - 20px); max-width: none; }
            #top-left { top: 10px; }
            #top-right { top: auto; bottom: 80px; max-height: 35vh; overflow-y: visible; }
            #legend-container { bottom: 10px; left: 10px; width: auto; }
            #stats-bar { display: none; }
            #stats-chip { display: block; position: fixed; bottom: 20px; right: 20px; z-index: 1001; }
            .panel { padding: 12px; }
            .panel-content { max-height: 300px; }
            #top-left .panel-content, #top-right .panel-content { margin-top: 12px; }
            input[type="text"], button, select { padding: 12px; font-size: 14px; }
        }

        .options-menu {
            margin-top: 16px;
            border-top: 1px solid #333;
            padding-top: 16px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .switch-container {
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
            cursor: pointer; padding: 6px 0;
        }
        .switch-label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: 600; letter-spacing: 0.5px; }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .3s; border-radius: 34px; border: 1px solid #444;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 3px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background: linear-gradient(135deg, #0062ff, #00d4ff); border-color: #00d4ff; }
        input:checked + .slider:before { transform: translateX(20px); }

        .legend-content {
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform-origin: bottom left;
            margin-bottom: 12px;
            min-width: 200px;
        }
        .legend-content.hidden {
            opacity: 0; transform: scale(0.9) translateY(10px);
            pointer-events: none; display: none;
        }
        .legend-item { display: flex; align-items: center; gap: 12px; font-size: 11px; margin-bottom: 8px; text-transform: uppercase; font-weight: 600; }
        .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0; }

        .toggle-btn {
            width: 44px; height: 44px;
            background: rgba(20,20,20,0.95);
            border: 1px solid #444; color: #00d4ff; border-radius: 50%;
            cursor: pointer; font-size: 20px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; backdrop-filter: blur(10px); transition: all 0.2s;
        }
        .toggle-btn:hover { background: #2a2a2a; border-color: #00d4ff; }

        input[type="text"], button, select {
            background: #1a1a1a; border: 1px solid #444; color: white;
            padding: 10px 12px; border-radius: 8px; font-size: 13px;
            width: 100%; box-sizing: border-box; transition: all 0.2s;
        }
        select { cursor: pointer; margin-bottom: 12px; }
        input[type="text"]:focus, select:focus { outline: none; border-color: #00d4ff; background: #222; }
        button {
            cursor: pointer; background: linear-gradient(135deg, #0062ff, #0088ff);
            border: none; font-weight: 600; margin-top: 6px;
            text-transform: uppercase; letter-spacing: 0.5px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,98,255,0.3); }
        button:active { transform: translateY(0); }
        .btn-reset { background: #333; }
        .btn-reset:hover { box-shadow: 0 4px 12px rgba(255,255,255,0.1); }

        /* MapLibre popup custom */
        .maplibregl-popup-content {
            background: rgba(10,10,10,0.95) !important;
            color: white !important;
            border: 1px solid #333 !important;
            border-radius: 8px !important;
            padding: 10px 14px !important;
            font-size: 13px !important;
        }
        .maplibregl-popup-tip { border-top-color: #333 !important; }

        .nap-item {
            display: flex; justify-content: space-between; align-items: center;
            background: #1a1a1a; padding: 10px 14px; margin-top: 8px;
            border-left: 4px solid #00d4ff; border-radius: 6px; font-size: 13px;
            animation: slideIn 0.2s ease;
        }
        .remove-nap { color: #ff4747; cursor: pointer; font-weight: bold; font-size: 18px; padding: 0 4px; transition: transform 0.2s; }
        .remove-nap:hover { transform: scale(1.2); }
        .section-title { display: flex; align-items: center; gap: 8px; margin-bottom: 0; }
        .section-title strong { font-size: 13px; color: #00d4ff; letter-spacing: 0.5px; }
        .badge { background: #00d4ff; color: #000; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: bold; }
        .search-container { display: flex; gap: 8px; }
        .search-container button { margin-top: 0; width: auto; padding: 10px 16px; }
        .nap-input-container { display: flex; gap: 8px; }
        .nap-input-container input { flex: 1; }
        .nap-input-container button { margin-top: 0; width: 80px; background: #00d4ff; color: #000; }
        #napList { max-height: 200px; overflow-y: auto; margin-top: 8px; }
        #napList::-webkit-scrollbar { width: 6px; }
        #napList::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 3px; }
        #napList::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        .empty-state { color: #666; text-align: center; padding: 20px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .selected-info {
            background: rgba(0,212,255,0.1); border-radius: 6px; padding: 8px 12px;
            margin-bottom: 12px; border: 1px solid rgba(0,212,255,0.2);
        }
        .selected-name { color: #00d4ff; font-weight: bold; font-size: 14px; }

        /* MapLibre ctrl hide */
        .maplibregl-ctrl-bottom-left,
        .maplibregl-ctrl-bottom-right { display: none !important; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader">
        <div class="loader-spinner"></div>
        <div>Loading Strategic Data...</div>
    </div>
</div>
<div id="toast-container"></div>

<datalist id="nazioniList"></datalist>

<!-- Top Left Panel -->
<div id="top-left" class="overlay">
    <div class="panel">
        <div class="panel-header" onclick="togglePanel('panel-left')">
            <div class="section-title">
                <strong>⚔️ WARERA DIPLOMACY OS</strong>
                <span class="badge">v3.0</span>
            </div>
            <span class="collapse-icon" id="icon-left">▼</span>
        </div>
        <div id="panel-left" class="panel-content">
            <!-- Selettore modalità -->
            <select id="mode-selector" onchange="setMode(this.value)">
                <option value="diplomacy" selected>🗺️ Diplomacy (Current)</option>
                <option value="blocs">🏛️ Alliance Blocs</option>
                <option value="original">🗺️ Original Borders + Diplomacy</option>
            </select>

                <div style="font-size: 11px; color: #aaa; margin-bottom: 4px;">SELECTED NATION</div>

                    <span id="flag-wrapper" style="display: inline-block; vertical-align: middle;"></span>

                </div>
            </div>

                <input type="text" id="cercaInput" list="nazioniList" placeholder="Search nation..." autocomplete="off">
                <button onclick="cercaNazione()">🔍</button>
                <button class="btn-reset" onclick="resetDiplomazia()">↻</button>
            </div>
            <div class="options-menu">
                <label class="switch-container">
                    <span class="switch-label">🌐 Extended Diplomacy</span>
                    <div class="switch">

<!-- Top Right Panel -->

    <div class="toggle-btn" onclick="toggleLegend()">ℹ️</div>
</div>

<!-- Stats Bar -->

        <div class="stats-content">
            <div class="stat-item"><span>ALLIES</span><span class="stat-value" id="stats-allies">0</span></div>
            <div class="stat-item"><span>WARS</span><span class="stat-value" id="stats-wars">0</span></div>

</div>

<!-- Mobile Stats Chip -->
<div id="stats-chip" onclick="toggleStatsDetails()">
    <div class="stats-chip-content">
        <div class="stats-chip-item">🤝 <span class="stats-chip-value" id="chip-allies">0</span></div>
        <div class="stats-chip-item">⚔️ <span class="stats-chip-value" id="chip-wars">0</span></div>

<div id="map"></div>

<script>
// ============================================================
// GLOBAL STATE
// ============================================================
let map;
let nazioniGlobal = [];
let mapDataGlobal = null;
let selectedCountryId = null;
let customNaps = [];
let nationBaseColorMap = new Map(); // countryId -> colore base (strokeColor)
const nationMap = new Map();
const multiBlocMap = new Map(); // countryId -> { colors: [], patternKey: string }

let baseGeoJSON = null;
let originalLabelsData = [];
let labelsData = [];

// Modalità corrente: 'diplomacy' o 'blocs' o 'original'
let currentMode = 'diplomacy';

const COLORS = {
    SELECTED:         "#ffcc00",
    WAR_DIRECT:       "#ff0000",
    WAR_INDIRECT:     "#b30000",
    ALLY_DIRECT:      "#2ecc71",
    ALLY_INDIRECT:    "#145a32",
    BORDERLINE:       "#ff9100",
    NAP:              "#00d4ff",
    DEFAULT_LAND:     "#4a4e5a",
    NEUTRAL_UNSELECTED:"#3a3d46",
    OCEAN:            "#000000",
    // Colori per i blocchi
    ITALIAN_BLOC:     "#1b557a",   // blu
    WESTERN_BLOC:     "#55a5d9",   // blu simile a Olive Union
    AFRICAN_UNION:    "#e67e22",   // arancione
    ASIAN_FEDERATION: "#8e44ad",   // viola
    ICDP:             "#c0392b"    // rosso
};

// Source/layer IDs
const SRC_REGIONS = 'regions-src';
const SRC_BORDERS = 'borders-src';
const SRC_LABELS  = 'labels-src';

const LYR_FILL    = 'regions-fill';
const LYR_OUTLINE = 'regions-outline';
const LYR_COAST   = 'regions-coast';
const LYR_BORDER  = 'borders-line';
const LYR_MULTI_BLOC = 'multi-bloc-pattern';

// ============================================================
// BLOC DEFINITIONS
// ============================================================
const blocColorMap = new Map(); // countryId -> color

const italianBlocCodes = new Set(['IT','HR','HU','GR','TR','IQ','EG','LT']);
const icdpCodes = new Set(['RO','DE','UA','RS']);
const asianFederationCodes = new Set([
    'BT', 'BN', 'CN', 'TL', 'EG', 'FJ', 'IN', 'IQ', 'PS', 'PG', 'PH', 'TR', 'KP', 'VN', 'VU'
]);
const africanCodes = new Set([
    'AO','DZ','BJ','BW','BF','BI','CM','CV','CF','KM','CD','DJ','EG','GQ','ET','GA','GM','GH','GN','GW','CI','KE','LS','LR','LY','MW','MR','MU','MA','MZ','NA','NE','NG','RW','ST','SN','SC','SL','SS','SD','SZ','TZ','TG','TN','UG','ZM','ZW'
]);
const westernBlocCodes = new Set(['FR', 'NL', 'BE', 'AR', 'CL', 'US']);

function buildBlocMap() {
    blocColorMap.clear();
    multiBlocMap.clear();

    nazioniGlobal.forEach(n => {
        const code = n.code?.toUpperCase();
        if (!code) return;

        const hits = [];
        if (italianBlocCodes.has(code))     hits.push({ name: 'italian', color: COLORS.ITALIAN_BLOC });
        if (icdpCodes.has(code))            hits.push({ name: 'icdp',    color: COLORS.ICDP });
        if (asianFederationCodes.has(code)) hits.push({ name: 'asian',   color: COLORS.ASIAN_FEDERATION });
        if (africanCodes.has(code))         hits.push({ name: 'african', color: COLORS.AFRICAN_UNION });
        if (westernBlocCodes.has(code))     hits.push({ name: 'western', color: COLORS.WESTERN_BLOC }); 

        if (hits.length === 0) return;

        if (hits.length === 1) {
            blocColorMap.set(n._id, hits[0].color);
        } else {
            const patternKey = 'stripe-' + hits.map(h => h.name).join('-');
            multiBlocMap.set(n._id, { colors: hits.map(h => h.color), patternKey });
            blocColorMap.set(n._id, hits[0].color); // fallback colore singolo
        }
    });
}

function getOriginalBordersMesh(topoData) {
    const cloned = JSON.parse(JSON.stringify(topoData));
    const regions = cloned.objects.regions;
    if (regions && regions.geometries) {
        regions.geometries.forEach(geom => {
            if (geom.properties && geom.properties.initialCountryId) {
                geom.properties.countryId = geom.properties.initialCountryId;
            }
        });
    }
    const mesh = topojson.mesh(cloned, cloned.objects.regions, (a, b) => a !== b && a.properties.countryId !== b.properties.countryId);
    return mesh;
}

function createBlendPattern(colors, sz = 2048) {
    const canvas = document.createElement('canvas');
    canvas.width = sz;
    canvas.height = sz;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createLinearGradient(0, 0, sz, sz);
    const step = 1 / (colors.length - 1);
    colors.forEach((color, idx) => {
        gradient.addColorStop(idx * step, color);
    });
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, sz, sz);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(0, 0, sz, sz);
    return canvas;
}

function createAndAddStripePatterns() {
    const seen = new Set();
    multiBlocMap.forEach(({ colors, patternKey }) => {
        if (seen.has(patternKey)) return;
        seen.add(patternKey);
        const canvas = createBlendPattern(colors, 8);
        const img = new Image();
        img.onload = () => {
            if (!map.hasImage(patternKey)) {
                map.addImage(patternKey, img);
                if (map.getLayer(LYR_MULTI_BLOC)) map.triggerRepaint();
            }
        };
        img.src = canvas.toDataURL();
    });
}

function buildMultiBlocPatternExpression() {
    const entries = [...multiBlocMap.entries()];
    if (entries.length === 0) return '';
    const expr = ['match', ['get', 'countryId']];
    entries.forEach(([id, { patternKey }]) => expr.push(id, patternKey));
    expr.push(entries[0][1].patternKey);
    return expr;
}

// ============================================================
// PANEL / UI HELPERS
// ============================================================
function togglePanel(panelId) {
    const content = document.getElementById(panelId);
    const side = panelId.split('-')[1];
    const icon = document.getElementById('icon-' + side);
    if (!content || !icon) return;
    const isNowCollapsed = !content.classList.contains('collapsed');
    if (isNowCollapsed) {
        content.classList.add('collapsed');
        icon.classList.add('collapsed');
    } else {
        content.classList.remove('collapsed');
        icon.classList.remove('collapsed');
    }
    localStorage.setItem(panelId + '-collapsed', isNowCollapsed);
}

function initPanelStates() {
    ['panel-left', 'panel-right'].forEach(id => {
        const content = document.getElementById(id);
        const side = id.split('-')[1];
        const icon = document.getElementById('icon-' + side);
        if (!content || !icon) return;
        const saved = localStorage.getItem(id + '-collapsed');
        if (saved === 'true') {
            content.classList.add('collapsed');
            icon.classList.add('collapsed');
        } else {
            content.classList.remove('collapsed');
            icon.classList.remove('collapsed');
        }
    });
}

function updateStatsChip() {
    document.getElementById('chip-allies').textContent = document.getElementById('stats-allies').textContent;
    document.getElementById('chip-wars').textContent   = document.getElementById('stats-wars').textContent;
    document.getElementById('chip-naps').textContent   = document.getElementById('stats-naps').textContent;
}

function toggleStatsDetails() {
    const name  = document.getElementById('selected-name-display').textContent || 'No selection';
    const allies = document.getElementById('stats-allies').textContent;
    const wars   = document.getElementById('stats-wars').textContent;
    const naps   = document.getElementById('stats-naps').textContent;
    showToast(`${name} | Allies: ${allies} | Wars: ${wars} | NAPs: ${naps}`, 'info');
}

function showToast(message, type = 'info') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
        toast.style.opacity = '0';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}

function showLoading() { document.getElementById('loading-overlay').style.display = 'flex'; }
function hideLoading() {
    const el = document.getElementById('loading-overlay');
    el.style.opacity = '0';
    setTimeout(() => el.style.display = 'none', 300);
}
function toggleLegend() { document.getElementById('dynamic-legend').classList.toggle('hidden'); }

// ============================================================
// DIPLOMACY HELPERS
// ============================================================
function getIndirectAllies(targetId) {
    const target = nationMap.get(targetId);
    if (!target || !target.allies) return [];
    const indirect = new Set();
    target.allies.forEach(allyId => {
        const ally = nationMap.get(allyId);
        if (ally && ally.allies) {
            ally.allies.forEach(id => {
                if (id !== targetId && !target.allies.includes(id)) indirect.add(id);
            });
        }
    });
    return Array.from(indirect);
}

function getEnemyAllies(targetId) {
    const target = nationMap.get(targetId);
    if (!target || !target.warsWith) return [];
    const enemyAllies = new Set();
    target.warsWith.forEach(enemyId => {
        const enemy = nationMap.get(enemyId);
        if (enemy && enemy.allies) {
            enemy.allies.forEach(id => {
                if (id !== targetId) enemyAllies.add(id);
            });
        }
    });
    return Array.from(enemyAllies);
}

function getColorForCountry(cId, directWars, directAllies, indirectAllies, enemyAllies, styleMap, isExtended) {
    const isManualNap = customNaps.includes(cId);
    if (!selectedCountryId) {
        return styleMap[cId] || COLORS.NEUTRAL_UNSELECTED;
    }
    if (cId === selectedCountryId)                              return COLORS.SELECTED;
    if (isManualNap)                                            return COLORS.NAP;
    if (directAllies.includes(cId))                             return COLORS.ALLY_DIRECT;
    if (directWars.includes(cId))                               return COLORS.WAR_DIRECT;
    if (enemyAllies.includes(cId) && indirectAllies.includes(cId) && isExtended) return COLORS.BORDERLINE;
    if (enemyAllies.includes(cId))                              return COLORS.WAR_INDIRECT;
    if (indirectAllies.includes(cId) && isExtended)             return COLORS.ALLY_INDIRECT;
    return COLORS.DEFAULT_LAND;
}

function buildDiplomacyColorExpression(directWars, directAllies, indirectAllies, enemyAllies, styleMap, isExtended) {
    const expr = ['match', ['get', 'countryId']];
    const allIds = new Set([
        ...Object.keys(styleMap),
        ...directWars,
        ...directAllies,
        ...indirectAllies,
        ...enemyAllies,
        ...customNaps,
        ...(selectedCountryId ? [selectedCountryId] : [])
    ]);
    allIds.forEach(cId => {
        const color = getColorForCountry(cId, directWars, directAllies, indirectAllies, enemyAllies, styleMap, isExtended);
        expr.push(cId, color);
    });
    expr.push(selectedCountryId ? COLORS.DEFAULT_LAND : COLORS.NEUTRAL_UNSELECTED);
    return expr;
}

function buildBlocColorExpression() {
    const expr = ['match', ['get', 'countryId']];
    for (let [id, color] of blocColorMap.entries()) {
        if (multiBlocMap.has(id)) continue;
        expr.push(id, color);
    }
    expr.push(COLORS.DEFAULT_LAND);
    return expr;
}

function buildOriginalColorExpression(directWars, directAllies, indirectAllies, enemyAllies, isExtended) {
    const colorMap = new Map();
    nazioniGlobal.forEach(n => {
        const id = n._id;
        let color;
        if (!selectedCountryId) {
            color = nationBaseColorMap.get(id) || COLORS.DEFAULT_LAND;
        } else if (id === selectedCountryId) {
            color = COLORS.SELECTED;
        } else if (customNaps.includes(id)) {
            color = COLORS.NAP;
        } else if (directAllies.includes(id)) {
            color = COLORS.ALLY_DIRECT;
        } else if (directWars.includes(id)) {
            color = COLORS.WAR_DIRECT;
        } else if (enemyAllies.includes(id) && indirectAllies.includes(id) && isExtended) {
            color = COLORS.BORDERLINE;
        } else if (enemyAllies.includes(id)) {
            color = COLORS.WAR_INDIRECT;
        } else if (indirectAllies.includes(id) && isExtended) {
            color = COLORS.ALLY_INDIRECT;
        } else {
            color = COLORS.DEFAULT_LAND;
        }
        colorMap.set(id, color);
    });
    const expr = ['match', ['to-string', ['get', 'initialCountryId']]];
    for (let [id, color] of colorMap.entries()) {
        expr.push(id.toString(), color);
    }
    expr.push(COLORS.NEUTRAL_UNSELECTED);
    return expr;
}
function flattenCoords(geometry) {
    const result = [];
    function extract(c) {
        if (!c) return;
        if (typeof c[0] === 'number') result.push(c);
        else c.forEach(extract);
    }
    extract(geometry.coordinates);
    return result;
}

function buildOriginalLabels() {
    if (!baseGeoJSON || !labelsData.length) return;

    // Indice delle regioni con bounding box e geometria
    const regionIndex = [];
    baseGeoJSON.features.forEach(f => {
        const initId = f.properties?.initialCountryId;
        if (!initId) return;
        const coords = flattenCoords(f.geometry);
        if (!coords.length) return;
        let minLng = Infinity, maxLng = -Infinity, minLat = Infinity, maxLat = -Infinity;
        coords.forEach(c => {
            minLng = Math.min(minLng, c[0]);
            maxLng = Math.max(maxLng, c[0]);
            minLat = Math.min(minLat, c[1]);
            maxLat = Math.max(maxLat, c[1]);
        });
        regionIndex.push({
            initId,
            minLng, maxLng, minLat, maxLat,
            geometry: f.geometry,
            numCoords: coords.length
        });
    });

    // Funzione point-in-polygon (solo per Polygon/MultiPolygon)
    function pointInPolygon(point, polygon) {
        const x = point[0], y = point[1];
        let inside = false;
        function processRing(ring) {
            for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
                const xi = ring[i][0], yi = ring[i][1];
                const xj = ring[j][0], yj = ring[j][1];
                const intersect = ((yi > y) != (yj > y)) &&
                    (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
        }
        if (polygon.type === 'Polygon') {
            processRing(polygon.coordinates[0]);
        } else if (polygon.type === 'MultiPolygon') {
            polygon.coordinates.forEach(poly => processRing(poly[0]));
        }
        return inside;
    }

    // Mappa: initialCountryId -> miglior capitale (flagSize maggiore)
    const capitalMap = new Map();
    labelsData.forEach(label => {
        const coords = label.coordinates;
        if (!coords) return;
        // Trova la regione che contiene il punto
        let bestRegion = null;
        for (let region of regionIndex) {
            if (coords[0] >= region.minLng && coords[0] <= region.maxLng &&
                coords[1] >= region.minLat && coords[1] <= region.maxLat) {
                if (pointInPolygon(coords, region.geometry)) {
                    bestRegion = region;
                    break;
                }
            }
        }
        if (bestRegion) {
            const existing = capitalMap.get(bestRegion.initId);
            const flagSize = label.properties.flagSize || 0;
            if (!existing || flagSize > (existing.flagSize || 0)) {
                capitalMap.set(bestRegion.initId, {
                    coordinates: coords,
                    flagSize: flagSize,
                    label: label
                });
            }
        }
    });

    // Fallback per nazioni senza capitale: usa centro della regione più grande
    const centroidMap = new Map(); // initId -> { center, numCoords }
    regionIndex.forEach(region => {
        if (capitalMap.has(region.initId)) return;
        const best = centroidMap.get(region.initId);
        if (!best || region.numCoords > best.numCoords) {
            // Calcola centro geometrico approssimato (media coordinate)
            const coords = flattenCoords(region.geometry);
            let sumLng = 0, sumLat = 0;
            coords.forEach(c => { sumLng += c[0]; sumLat += c[1]; });
            const center = [sumLng / coords.length, sumLat / coords.length];
            centroidMap.set(region.initId, { center, numCoords: region.numCoords });
        }
    });

    // Costruisci originalLabelsData
    originalLabelsData = [];
    capitalMap.forEach((data, initId) => {
        const nation = nationMap.get(initId);
        const label = data.label;
        originalLabelsData.push({
            coordinates: data.coordinates,
            properties: {
                countryId: initId,
                countryName: nation ? nation.name : label.properties.countryName,
                countryCode: nation ? (nation.code || '').toLowerCase() : (label.properties.countryCode || '').toLowerCase(),
                flagSize: label.properties.flagSize,
                textSize: label.properties.textSize,
                textColor: label.properties.textColor,
                strokeColor: nationBaseColorMap.get(initId) || COLORS.DEFAULT_LAND
            }
        });
    });
    centroidMap.forEach((data, initId) => {
        const nation = nationMap.get(initId);
        if (!nation) return;
        originalLabelsData.push({
            coordinates: data.center,
            properties: {
                countryId: initId,
                countryName: nation.name,
                countryCode: (nation.code || '').toLowerCase(),
                flagSize: 0.2,
                textSize: 10,
                textColor: '#cccccc',
                strokeColor: nationBaseColorMap.get(initId) || COLORS.DEFAULT_LAND
            }
        });
    });
}
function hashColor(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) h = ((h << 5) + h) + str.charCodeAt(i);
    const hue = Math.abs(h) % 360;
    return `hsl(${hue}, 45%, 32%)`;
}

function renderMap() {
    if (!map || !mapDataGlobal) return;

    updateDynamicLegend();
    updateStats();
    updateSelectedDisplay();

    const borderLayer = map.getLayer(LYR_BORDER);
    const originalBorderLayer = map.getLayer('original-borders-line');
    if (currentMode === 'original') {
        if (borderLayer) map.setLayoutProperty(LYR_BORDER, 'visibility', 'none');
        if (originalBorderLayer) map.setLayoutProperty('original-borders-line', 'visibility', 'visible');
    } else {
        if (borderLayer) map.setLayoutProperty(LYR_BORDER, 'visibility', 'visible');
        if (originalBorderLayer) map.setLayoutProperty('original-borders-line', 'visibility', 'none');
    }

    if (currentMode === 'blocs') {
        const expr = buildBlocColorExpression();
        if (map.getLayer(LYR_FILL)) {
            map.setPaintProperty(LYR_FILL, 'fill-color', expr);
            map.setPaintProperty(LYR_FILL, 'fill-opacity', 0.9);
        }
        if (map.getLayer(LYR_MULTI_BLOC)) {
            const multiIds = [...multiBlocMap.keys()];
            if (multiIds.length > 0) {
                map.setFilter(LYR_MULTI_BLOC, ['in', ['get', 'countryId'], ['literal', multiIds]]);
                map.setPaintProperty(LYR_MULTI_BLOC, 'fill-pattern', buildMultiBlocPatternExpression());
            }
            map.setLayoutProperty(LYR_MULTI_BLOC, 'visibility', multiIds.length > 0 ? 'visible' : 'none');
        }
    } else {
        if (map.getLayer(LYR_MULTI_BLOC)) {
            map.setLayoutProperty(LYR_MULTI_BLOC, 'visibility', 'none');
        }

        const isExtended = document.getElementById('checkExtended').checked;
        let directWars = [], directAllies = [], indirectAllies = [], enemyAllies = [];
        if (selectedCountryId) {
            const target = nationMap.get(selectedCountryId);
            if (target) {
                directWars     = target.warsWith || [];
                directAllies   = target.allies   || [];
                indirectAllies = getIndirectAllies(selectedCountryId);
                enemyAllies    = getEnemyAllies(selectedCountryId);
            }
        }

        let fillExpr;
        if (currentMode === 'original') {
            fillExpr = buildOriginalColorExpression(directWars, directAllies, indirectAllies, enemyAllies, isExtended);
        } else {
            const styleMap = {};
            labelsData.forEach(l => {
                if (l.properties?.countryId && l.properties?.strokeColor)
                    styleMap[l.properties.countryId] = l.properties.strokeColor;
            });
            fillExpr = buildDiplomacyColorExpression(directWars, directAllies, indirectAllies, enemyAllies, styleMap, isExtended);
        }

        if (map.getLayer(LYR_FILL)) {
            map.setPaintProperty(LYR_FILL, 'fill-color', fillExpr);
            map.setPaintProperty(LYR_FILL, 'fill-opacity', 0.9);
        }
    }

    toggleLabels();
    if (labelCanvas) map.triggerRepaint();
}

let labelCanvas = null;

function initLabelCanvas() {
    labelCanvas = document.createElement('canvas');
    labelCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;z-index:500;';
    map.getContainer().appendChild(labelCanvas);

}

function resizeLabelCanvas() {
    if (!labelCanvas) return;
    const container = map.getContainer();
    const r = window.devicePixelRatio || 1;
    labelCanvas.width  = container.clientWidth  * r;
    labelCanvas.height = container.clientHeight * r;
    labelCanvas.style.width  = container.clientWidth  + 'px';
    labelCanvas.style.height = container.clientHeight + 'px';
    labelCtx.scale(r, r);
}

function toggleLabels() {
    if (labelCanvas) map.triggerRepaint();
}

function drawBlocLabels(ctx, W, H) {
    if (currentMode !== 'blocs') return;
    const zoom = map.getZoom();
    const fontSize = Math.max(20, Math.min(40, 24 * (1 + (zoom - 2) * 0.2)));
    const blocPositions = [
        { name: 'OLIVE UNION', lng: 30, lat: 40, color: COLORS.ITALIAN_BLOC },
        { name: 'OLIVE UNION ALLIES', lng: -50, lat: 30, color: COLORS.WESTERN_BLOC },
        { name: 'AFRICAN UNION', lng: -10, lat: -20, color: COLORS.AFRICAN_UNION },
        { name: 'ASIAN FEDERATION', lng: 90, lat: -15, color: COLORS.ASIAN_FEDERATION },
        { name: 'ICDP', lng: 20, lat: 52, color: COLORS.ICDP }
    ];
    blocPositions.forEach(b => {
        const pt = map.project([b.lng, b.lat]);
        const sx = pt.x, sy = pt.y;
        if (sx < -100 || sx > W + 100 || sy < -60 || sy > H + 60) return;
        ctx.font = `bold ${fontSize}px "JetBrains Mono", monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 8;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 4;
        ctx.strokeText(b.name, sx, sy);
        ctx.shadowBlur = 0;
        ctx.fillStyle = b.color;
        ctx.fillText(b.name, sx, sy);
    });
}

function drawLabels() {
    const BLOC_MARGIN = 30;
    const NATION_MARGIN = 1;

    if (!labelCanvas || !labelCtx || !labelsData.length) return;
    const showNations = document.getElementById('checkLabels').checked;

    const W = labelCanvas.width / (window.devicePixelRatio || 1);
    const H = labelCanvas.height / (window.devicePixelRatio || 1);
    const ctx = labelCtx;
    ctx.save();
    ctx.setTransform(window.devicePixelRatio || 1, 0, 0, window.devicePixelRatio || 1, 0, 0);
    ctx.clearRect(0, 0, W, H);

    let drawnNationBoxes = [];
    let blocBBoxes = [];

    // Nomi dei blocchi (solo modalità blocs)
    if (currentMode === 'blocs') {
        drawBlocLabels(ctx, W, H);
        const zoom = map.getZoom();
        const fontSize = Math.max(20, Math.min(40, 24 * (1 + (zoom - 2) * 0.2)));
        ctx.font = `bold ${fontSize}px "JetBrains Mono", monospace`;
        const blocPositions = [
            { name: 'OLIVE UNION', lng: 30, lat: 40 },
            { name: 'WESTERN BLOC', lng: -50, lat: 30 },
            { name: 'AFRICAN UNION', lng: -10, lat: -20 },
            { name: 'ASIAN FEDERATION', lng: 90, lat: -15 },
            { name: 'ICDP', lng: 20, lat: 52 }
        ];
        blocPositions.forEach(b => {
            const pt = map.project([b.lng, b.lat]);
            if (pt.x >= -100 && pt.x <= W + 100 && pt.y >= -60 && pt.y <= H + 60) {
                const metrics = ctx.measureText(b.name);
                const textWidth = metrics.width;
                const textHeight = fontSize;
                blocBBoxes.push({
                    xMin: pt.x - textWidth / 2 - BLOC_MARGIN,
                    xMax: pt.x + textWidth / 2 + BLOC_MARGIN,
                    yMin: pt.y - textHeight / 2 - BLOC_MARGIN,
                    yMax: pt.y + textHeight / 2 + BLOC_MARGIN
                });
            }
        });
    }

    // Se le etichette nazioni sono disattivate, esci
    if (!showNations) {
        ctx.restore();
        return;
    }

    // In modalità original, mostriamo comunque le etichette (ma con colori appropriati)
    const zoom = map.getZoom();
    // usa labelsData o originalLabelsData in base alla modalità
    const sourceLabels = currentMode === 'original' ? originalLabelsData : labelsData;
    const sorted = [...sourceLabels].sort((a, b) => (b.properties.flagSize || 0) - (a.properties.flagSize || 0));

    function intersects(box1, box2) {
        return !(box2.xMin > box1.xMax || box2.xMax < box1.xMin ||
                 box2.yMin > box1.yMax || box2.yMax < box1.yMin);
    }

    sorted.forEach(label => {
        const props = label.properties;
        const flagSize = props.flagSize || 0.2;
        const coords = label.coordinates;
        if (!coords) return;

        if (zoom < 2.5 && flagSize < 0.15) return;
        if (zoom < 3.5 && flagSize < 0.08) return;

        const pt = map.project([coords[0], coords[1]]);
        const sx = pt.x, sy = pt.y;
        if (sx < -100 || sx > W + 100 || sy < -60 || sy > H + 60) return;

        const nameStr = props.countryName?.toUpperCase() || '';
        const baseSize = props.textSize || 10;
        let scale = 1.0;
        if (zoom < 2.5) scale = 1.4;
        else if (zoom < 3) scale = 1.3;
        else if (zoom < 4) scale = 1.2;
        else if (zoom < 5) scale = 1.0;
        else scale = 0.9;
        const fontSize = Math.round(baseSize * scale);
        ctx.font = `bold ${fontSize}px "JetBrains Mono", monospace`;
        const textWidth = ctx.measureText(nameStr).width;
        const textHeight = fontSize;

        const nationBox = {
            xMin: sx - textWidth / 2 - NATION_MARGIN,
            xMax: sx + textWidth / 2 + NATION_MARGIN,
            yMin: sy - textHeight / 2 - NATION_MARGIN,
            yMax: sy + textHeight / 2 + NATION_MARGIN
        };

        if (currentMode === 'blocs') {
            let collideBloc = false;
            for (let box of blocBBoxes) {
                if (intersects(nationBox, box)) { collideBloc = true; break; }
            }
            if (collideBloc) return;
        }

        let collideNation = false;
        for (let existingBox of drawnNationBoxes) {
            if (intersects(nationBox, existingBox)) { collideNation = true; break; }
        }
        if (collideNation) return;

        drawnNationBoxes.push(nationBox);

        const code = (props.countryCode || '').toLowerCase();
        const flagW = Math.round(16 * (zoom < 3 ? 1.5 : zoom < 4 ? 1.3 : zoom < 5 ? 1.1 : 1.0));
        const flagH = Math.round(11 * (zoom < 3 ? 1.5 : zoom < 4 ? 1.3 : zoom < 5 ? 1.1 : 1.0));
        const cachedFlag = flagImageCache.get(code);
        const totalH = (cachedFlag ? flagH + 2 : 0) + fontSize;
        const startY = sy - totalH / 2;

        if (cachedFlag) {
            ctx.drawImage(cachedFlag, sx - flagW / 2, startY, flagW, flagH);
        }

        // Colore del testo in base alla modalità
        let textColor;
        const cId = props.countryId;
        if (currentMode === 'blocs') {
            textColor = blocColorMap.get(cId) || '#cccccc';
            if (selectedCountryId === cId) textColor = '#ffffff';
        } else if (currentMode === 'original') {
            textColor = selectedCountryId ? '#ffffff' : (props.textColor || '#cccccc');
            if (selectedCountryId === cId) textColor = '#ffffff';
        } else {
            textColor = selectedCountryId ? '#ffffff' : (props.textColor || '#cccccc');
        }

        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.letterSpacing = '0.3px';
        const textY = startY + (cachedFlag ? flagH + 2 : 0);
        const upperName = nameStr;

        ctx.shadowColor = '#000';
        ctx.shadowBlur = 4;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.lineJoin = 'round';
        ctx.strokeText(upperName, sx, textY);
        ctx.shadowBlur = 0;
        ctx.fillStyle = textColor;
        ctx.fillText(upperName, sx, textY);
    });

    ctx.restore();
}
const flagImageCache = new Map();
function loadFlagImage(code) {
    if (!code || flagImageCache.has(code)) return;
    flagImageCache.set(code, null);
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => { flagImageCache.set(code, img); if (map) map.triggerRepaint(); };
    img.onerror = () => flagImageCache.set(code, null);
    img.src = `https://app.warera.io/images/map/${code}.png?v=21`;
}
function preloadAllFlags() {
    labelsData.forEach(l => { const c = l.properties?.countryCode?.toLowerCase(); if(c) loadFlagImage(c); });
}

// ============================================================
// SETUP MAP SOURCES & LAYERS
// ============================================================
function setupMapLayers() {
    const topoData = mapDataGlobal.map;
    baseGeoJSON = topojson.feature(topoData, topoData.objects.regions);
    labelsData = mapDataGlobal.countryLabels?.geometries || topoData.objects.countryLabels?.geometries || [];

    if (!map.getSource(SRC_REGIONS)) {
        map.addSource(SRC_REGIONS, { type: 'geojson', data: baseGeoJSON });
    } else {
        map.getSource(SRC_REGIONS).setData(baseGeoJSON);
    }

    const bordersMesh = topojson.mesh(topoData, topoData.objects.regions, (a, b) => a !== b && a.properties.countryId !== b.properties.countryId);
    const coastMesh   = topojson.mesh(topoData, topoData.objects.regions, (a, b) => a === b);
    const regionsMesh = topojson.mesh(topoData, topoData.objects.regions, (a, b) => a !== b && a.properties.countryId === b.properties.countryId);

    if (!map.getSource(SRC_BORDERS)) {
        map.addSource(SRC_BORDERS, {
            type: 'geojson',
            data: {
                type: 'FeatureCollection',
                features: [
                    { type: 'Feature', properties: { kind: 'border' }, geometry: bordersMesh },
                    { type: 'Feature', properties: { kind: 'coast'  }, geometry: coastMesh   },
                    { type: 'Feature', properties: { kind: 'region' }, geometry: regionsMesh }
                ]
            }
        });
    }

    const labelsGeoJSON = {
        type: 'FeatureCollection',
        features: labelsData.map(l => ({ type: 'Feature', geometry: { type: 'Point', coordinates: l.coordinates }, properties: l.properties }))
    };
    if (!map.getSource(SRC_LABELS)) {
        map.addSource(SRC_LABELS, { type: 'geojson', data: labelsGeoJSON });
    } else {
        map.getSource(SRC_LABELS).setData(labelsGeoJSON);
    }

    if (!map.getLayer(LYR_FILL)) {
        map.addLayer({
            id: LYR_FILL,
            type: 'fill',
            source: SRC_REGIONS,
            paint: { 'fill-color': COLORS.NEUTRAL_UNSELECTED, 'fill-opacity': 0.9 }
        });
    }

    // Calcola i confini originali (basati su initialCountryId) - dopo il fill layer
    const originalBordersMesh = getOriginalBordersMesh(topoData);
    if (!map.getSource('original-borders-src')) {
        map.addSource('original-borders-src', {
            type: 'geojson',
            data: originalBordersMesh
        });
        map.addLayer({
            id: 'original-borders-line',
            type: 'line',
            source: 'original-borders-src',
            paint: { 'line-color': '#ffffff', 'line-width': 2, 'line-opacity': 0.9 },
            layout: { visibility: 'none' }
        });
    }

    createAndAddStripePatterns();
    if (!map.getLayer(LYR_MULTI_BLOC)) {
        const multiIds = [...multiBlocMap.keys()];
        map.addLayer({
            id: LYR_MULTI_BLOC,
            type: 'fill',
            source: SRC_REGIONS,
            filter: multiIds.length > 0
                ? ['in', ['get', 'countryId'], ['literal', multiIds]]
                : ['==', ['get', 'countryId'], '___none___'],
            layout: { visibility: 'none' },
            paint: { 'fill-opacity': 0.92 }
        });
        if (multiIds.length > 0) {
            map.setPaintProperty(LYR_MULTI_BLOC, 'fill-pattern', buildMultiBlocPatternExpression());
        }
    }

    if (!map.getLayer(LYR_COAST)) {
        map.addLayer({
            id: LYR_COAST,
            type: 'line',
            source: SRC_BORDERS,
            filter: ['==', ['get', 'kind'], 'coast'],
            paint: { 'line-color': '#ffffff', 'line-width': 0.8, 'line-opacity': 0.9 }
        });
    }
    if (!map.getLayer(LYR_BORDER)) {
        map.addLayer({
            id: LYR_BORDER,
            type: 'line',
            source: SRC_BORDERS,
            filter: ['==', ['get', 'kind'], 'border'],
            paint: { 'line-color': '#ffffff', 'line-width': 0.8, 'line-opacity': 0.8 }
        });
    }
    if (!map.getLayer(LYR_OUTLINE)) {
        map.addLayer({
            id: LYR_OUTLINE,
            type: 'line',
            source: SRC_BORDERS,
            filter: ['==', ['get', 'kind'], 'region'],
            paint: { 'line-color': '#000000', 'line-width': 0.8, 'line-opacity': 0.7 }
        });
    }
    if (map.getLayer(LYR_OUTLINE) && map.getLayer(LYR_BORDER)) {
        map.moveLayer(LYR_OUTLINE, LYR_BORDER);
    }

    initLabelCanvas();
    preloadAllFlags();

    map.off('click', LYR_FILL, onRegionClick);
    map.on('click', LYR_FILL, onRegionClick);
    map.on('mouseenter', LYR_FILL, () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', LYR_FILL, () => map.getCanvas().style.cursor = '');

    renderMap();
}
function onRegionClick(e) {
    if (!e.features || e.features.length === 0) return;
    let cId;
    if (currentMode === 'original') {
        cId = e.features[0].properties.initialCountryId;
    } else {
        cId = e.features[0].properties.countryId;
    }
    selectedCountryId = (selectedCountryId === cId) ? null : cId;
    renderMap();
    if (selectedCountryId) {
        const nation = nationMap.get(selectedCountryId);
        if (nation) showToast(`Selected: ${nation.name}`, 'info');
    }
}

// ============================================================
// DATA FETCHING & INIT
// ============================================================
async function init() {
    map = new maplibregl.Map({
        container: 'map',
        style: {
            version: 8,
            glyphs: 'https://protomaps.github.io/basemaps-assets/fonts/{fontstack}/{range}.pbf',
            sources: {},
            layers: [{ id: 'background', type: 'background', paint: { 'background-color': COLORS.OCEAN } }]
        },
        center: [0, 20],
        zoom: 2,
        minZoom: 1.7,
        maxZoom: 8,
        renderWorldCopies: true,
        attributionControl: false,
        logoPosition: 'bottom-right'
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), 'top-right');

    map.on('load', async () => {
        await refreshData();
        initPanelStates();
    });
}

async function refreshData() {
    try {
        showLoading();
        const [resN, resM] = await Promise.all([
            fetch('https://api2.warera.io/trpc/country.getAllCountries'),
            fetch('https://api4.warera.io/trpc/map.getMapData')
        ]);
        if (!resN.ok || !resM.ok) throw new Error('Failed to fetch data');
        const nationsData = await resN.json();
        const mapData     = await resM.json();
        nazioniGlobal = nationsData.result.data;
        mapDataGlobal = mapData.result.data;
        nationMap.clear();
        nazioniGlobal.forEach(n => nationMap.set(n._id, n));
        buildBlocMap();
        popolaListe();
        setupMapLayers();

        // Colori base da labelsData (nazioni con territorio attuale)
        nationBaseColorMap.clear();
        labelsData.forEach(label => {
            if (label.properties?.countryId && label.properties?.strokeColor) {
                nationBaseColorMap.set(label.properties.countryId, label.properties.strokeColor);
            }
        });
        // Nazioni conquistate (non presenti in labelsData): colore generato
        nazioniGlobal.forEach(n => {
            if (!nationBaseColorMap.has(n._id)) {
                nationBaseColorMap.set(n._id, n.color || n.mapColor || hashColor(n._id));
            }
        });
        // Costruisci le etichette originali
         buildOriginalLabels();
        // Precarica bandiere anche per le nazioni originali
        originalLabelsData.forEach(label => {
            const code = label.properties?.countryCode?.toLowerCase();
            if (code && !flagImageCache.has(code)) {
                loadFlagImage(code);
            }
        });
        showToast('Strategic data loaded successfully', 'success');
    } catch (e) {
        console.error('Data Error:', e);
        showToast('Failed to load game data. Please refresh.', 'error');
    } finally {
        hideLoading();
    }
}

function popolaListe() {
    const datalist = document.getElementById('nazioniList');
    datalist.innerHTML = '';
    [...nazioniGlobal].sort((a, b) => a.name.localeCompare(b.name)).forEach(n => {
        const opt = document.createElement('option');
        opt.value = n.name;
        datalist.appendChild(opt);
    });
}

// ============================================================
// NAP MANAGEMENT
// ============================================================
function aggiungiNap() {
    const input = document.getElementById('napInput');
    const val = input.value.trim();
    if (!val) { showToast('Please enter a nation name', 'error'); return; }
    const found = nazioniGlobal.find(n => n.name.toLowerCase() === val.toLowerCase());
    if (!found) { showToast(`Nation "${val}" not found`, 'error'); return; }
    if (customNaps.includes(found._id)) { showToast(`${found.name} is already in NAP list`, 'error'); return; }
    if (selectedCountryId && found._id === selectedCountryId) { showToast(`Cannot add selected nation to NAP list`, 'error'); return; }
    customNaps.push(found._id);
    input.value = '';
    aggiornaListaNap();
    renderMap();
    showToast(`Added ${found.name} to NAP list`, 'success');
}

function rimuoviNap(id) {
    const nation = nationMap.get(id);
    customNaps = customNaps.filter(n => n !== id);
    aggiornaListaNap();
    renderMap();
    if (nation) showToast(`Removed ${nation.name} from NAP list`, 'info');
}

function aggiornaListaNap() {
    const container  = document.getElementById('napList');
    const countBadge = document.getElementById('nap-count');
    countBadge.textContent = customNaps.length;
    if (customNaps.length === 0) {
        container.innerHTML = '<div class="empty-state">No manual NAPs set</div>';
        return;
    }
    container.innerHTML = '';
    customNaps.forEach(id => {
        const n = nationMap.get(id);
        if (n) {
            container.innerHTML += `
                <div class="nap-item">
                    <span style="font-weight:600">${n.name}</span>
                    <span class="remove-nap" onclick="rimuoviNap('${id}')" title="Remove NAP">✕</span>
                </div>
            `;
        }
    });
}

// ============================================================
// SEARCH & RESET
// ============================================================
function cercaNazione() {
    const input = document.getElementById('cercaInput');
    const val = input.value.toLowerCase().trim();
    if (!val) { showToast('Please enter a nation name', 'error'); return; }
    const found = nazioniGlobal.find(n => n.name.toLowerCase() === val) ||
                  nazioniGlobal.find(n => n.name.toLowerCase().includes(val));
    if (found) {
        selectedCountryId = found._id;
        input.value = found.name;
        renderMap();
        showToast(`Selected: ${found.name}`, 'success');
        const labelInfo = labelsData.find(l => l.properties?.countryId === found._id);
        if (labelInfo && labelInfo.coordinates) {
            map.flyTo({ center: labelInfo.coordinates, zoom: Math.max(map.getZoom(), 3), duration: 800 });
        }
        if (window.innerWidth <= 768) document.getElementById('dynamic-legend').classList.add('hidden');
    } else {
        showToast(`Nation "${val}" not found`, 'error');
    }
}

function resetDiplomazia() {
    selectedCountryId = null;
    customNaps = [];
    document.getElementById('cercaInput').value = '';
    document.getElementById('checkExtended').checked = false;
    document.getElementById('napInput').value = '';
    aggiornaListaNap();
    renderMap();
    showToast('Reset complete', 'info');
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('cercaInput').addEventListener('keypress', e => { if (e.key === 'Enter') cercaNazione(); });
    document.getElementById('napInput').addEventListener('keypress',   e => { if (e.key === 'Enter') aggiungiNap(); });
});

window.onload = init;
</script>
