<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WarEra Diplomacy OS - Strategic Intelligence Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; background: #010409 !important; }
        
        /* UI Base */
        .overlay { position: absolute; z-index: 1000; pointer-events: none; width: auto; }
        .panel { 
            background: rgba(10, 10, 10, 0.95); 
            border: 1px solid #333; 
            padding: 12px; 
            border-radius: 8px; 
            pointer-events: auto; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        /* Desktop Layout */
        #top-left { top: 15px; left: 15px; width: 280px; }
        #top-right { top: 15px; right: 15px; width: 280px; }
        #legend-container { bottom: 25px; left: 15px; }

        /* Responsive Logic */
        @media (max-width: 768px) {
            #top-left, #top-right { 
                left: 10px; 
                right: 10px; 
                width: calc(100% - 20px); 
                max-width: none;
            }
            #top-left { top: 10px; }
            #top-right { 
                top: auto; 
                bottom: 80px; /* Sopra la legenda */
                max-height: 30vh;
                overflow-y: auto;
            }
            #legend-container { bottom: 10px; left: 10px; width: calc(100% - 20px); }
            
            .switch-label { font-size: 13px; }
            input[type="text"], button { padding: 12px; font-size: 14px; } /* Più grandi per le dita */
        }

        .options-menu { margin-top: 10px; border-top: 1px solid #333; padding-top: 12px; display: flex; flex-direction: column; gap: 10px; }
        .switch-container { display: flex; align-items: center; justify-content: space-between; gap: 10px; cursor: pointer; padding: 4px 0; }
        .switch-label { font-size: 11px; color: #aaa; text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .3s; border-radius: 34px; border: 1px solid #444; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #0062ff; border-color: #00d4ff; }
        input:checked + .slider:before { transform: translateX(18px); }

        .legend-content { transition: opacity 0.3s ease, transform 0.3s ease; transform-origin: bottom left; margin-bottom: 8px;}
        .legend-content.hidden { opacity: 0; transform: scale(0.9) translateY(10px); pointer-events: none; display: none; }
        .legend-item { display: flex; align-items: center; gap: 10px; font-size: 11px; margin-bottom: 6px; text-transform: uppercase; font-weight: bold; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #fff; flex-shrink: 0; }
        
        .toggle-btn { 
            width: 40px; height: 40px; background: #1a1a1a; border: 1px solid #444; 
            color: #00d4ff; border-radius: 50%; cursor: pointer; font-size: 18px;
            display: flex; align-items: center; justify-content: center; pointer-events: auto; 
        }

        input[type="text"], button { background: #1a1a1a; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; font-size: 13px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; background: #0062ff; border: none; font-weight: bold; margin-top: 6px; text-transform: uppercase; }
        .btn-reset { background: #333; }
        
        .nation-label { background: transparent !important; border: none !important; pointer-events: none !important; }
        .nation-name { font-size: 10px; font-weight: 800; text-transform: uppercase; text-shadow: 0 0 4px #000; color: #fff; white-space: nowrap; }
        .nap-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 8px 12px; margin-top: 6px; border-left: 4px solid #00d4ff; border-radius: 4px; font-size: 12px; }
        .remove-nap { color: #ff4747; cursor: pointer; font-weight: bold; font-size: 16px; padding-left: 10px; }
    </style>
</head>
<body>

<datalist id="nazioniList"></datalist>

<div id="top-left" class="overlay">
    <div class="panel">
        <strong style="color: #00d4ff; font-size: 14px;">WARERA DIPLOMACY OS</strong>
        <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 5px;">
            <input type="text" id="cercaInput" list="nazioniList" placeholder="Search nation...">
            <div style="display: flex; gap: 5px;">
                <button onclick="cercaNazione()">SEARCH</button>
                <button class="btn-reset" onclick="resetDiplomazia()">RESET</button>
            </div>
        </div>
        <div class="options-menu">
            <label class="switch-container">
                <span class="switch-label">Extended Diplomacy</span>
                <div class="switch">
                    <input type="checkbox" id="checkExtended" onchange="renderMap()">
                    <span class="slider"></span>
                </div>
            </label>
            <label class="switch-container">
                <span class="switch-label">Show Nation Names</span>
                <div class="switch">
                    <input type="checkbox" id="checkLabels" checked onchange="renderMap()">
                    <span class="slider"></span>
                </div>
            </label>
        </div>
    </div>
</div>

<div id="top-right" class="overlay">
    <div class="panel">
        <strong style="font-size: 12px; color: #00d4ff;">MANUAL NAP (PRIORITY)</strong>
        <div style="display: flex; gap: 5px; margin-top: 8px;">
            <input type="text" id="napInput" list="nazioniList" placeholder="Add NAP...">
            <button onclick="aggiungiNap()" style="background: #00d4ff; color: #000; margin-top: 0; width: 80px;">ADD</button>
        </div>
        <div id="napList" style="margin-top: 5px;"></div>
    </div>
</div>

<div id="legend-container" class="overlay">
    <div id="dynamic-legend" class="panel legend-content hidden"></div>
    <div class="toggle-btn" onclick="toggleLegend()">i</div>
</div>

<div id="map"></div>

<script>
    let map, nazioniGlobal = [], mapDataGlobal = null;
    let selectedCountryId = null;
    let customNaps = [];
    let layers = { regions: null, nationalBorders: null, coastlines: null, labels: L.layerGroup() };

    const COLORS = {
        SELECTED: "#ffcc00",
        WAR_DIRECT: "#ff0000",
        WAR_INDIRECT: "#b30000",
        ALLY_DIRECT: "#2ecc71",
        ALLY_INDIRECT: "#145a32",
        BORDERLINE: "#ff9100",
        NAP: "#00d4ff",
        DEFAULT_LAND: "#4a4e5a",
        NEUTRAL_UNSELECTED: "#3a3d46"
    };

    function toggleLegend() { document.getElementById('dynamic-legend').classList.toggle('hidden'); }

    function updateDynamicLegend() {
        const legendBox = document.getElementById('dynamic-legend');
        if (!selectedCountryId) {
            legendBox.innerHTML = `<div class="legend-item"><div class="dot" style="background: #555;"></div> NO SELECTION</div>`;
            return;
        }
        legendBox.innerHTML = `
            <div class="legend-item"><div class="dot" style="background: ${COLORS.SELECTED};"></div> SELECTED</div>
            <div class="legend-item"><div class="dot" style="background: ${COLORS.NAP};"></div> MANUAL NAP</div>
            <div class="legend-item"><div class="dot" style="background: ${COLORS.WAR_DIRECT};"></div> DIRECT WAR</div>
            <div class="legend-item"><div class="dot" style="background: ${COLORS.WAR_INDIRECT};"></div> INDIRECT ENEMY</div>
            <div class="legend-item"><div class="dot" style="background: ${COLORS.ALLY_DIRECT};"></div> DIRECT ALLY</div>
            <div class="legend-item"><div class="dot" style="background: ${COLORS.ALLY_INDIRECT};"></div> INDIRECT ALLY</div>
            <div class="legend-item"><div class="dot" style="background: ${COLORS.DEFAULT_LAND}; border: 1px solid #fff;"></div> NEUTRAL</div>
        `;
    }

    async function init() {
        map = L.map('map', { 
            center: [20, 0], 
            zoom: 2, 
            zoomControl: false, 
            attributionControl: false,
            maxBounds: [[-85, -180], [85, 180]]
        });
        layers.labels.addTo(map);
        await refreshData();
    }

    async function refreshData() {
        try {
            const [resN, resM] = await Promise.all([
                fetch('https://api2.warera.io/trpc/country.getAllCountries'),
                fetch('https://api4.warera.io/trpc/map.getMapData')
            ]);
            nazioniGlobal = (await resN.json()).result.data;
            mapDataGlobal = (await resM.json()).result.data;
            popolaListe();
            renderMap();
        } catch (e) { console.error("Data Error:", e); }
    }

    // [Funzioni Logiche getIndirectAllies e getEnemyAllies invariate come richiesto]
    function getIndirectAllies(targetId) {
        const target = nazioniGlobal.find(n => n._id === targetId);
        if (!target || !target.allies) return [];
        let indirect = new Set();
        target.allies.forEach(allyId => {
            const allyData = nazioniGlobal.find(n => n._id === allyId);
            if (allyData && allyData.allies) allyData.allies.forEach(id => {
                if (id !== targetId && !target.allies.includes(id)) indirect.add(id);
            });
        });
        return Array.from(indirect);
    }

    function getEnemyAllies(targetId) {
        const target = nazioniGlobal.find(n => n._id === targetId);
        if (!target || !target.warsWith) return [];
        let eAllies = new Set();
        target.warsWith.forEach(enemyId => {
            const enemyData = nazioniGlobal.find(n => n._id === enemyId);
            if (enemyData && enemyData.allies) enemyData.allies.forEach(id => {
                if (id !== targetId) eAllies.add(id);
            });
        });
        return Array.from(eAllies);
    }

    function renderMap() {
        if (!mapDataGlobal) return;
        updateDynamicLegend();
        const topoData = mapDataGlobal.map;
        const labelsData = (mapDataGlobal.countryLabels || (topoData.objects.countryLabels ? topoData.objects.countryLabels.geometries : []));
        
        const isExtended = document.getElementById('checkExtended').checked;
        const showLabels = document.getElementById('checkLabels').checked;

        if (layers.regions) map.removeLayer(layers.regions);
        if (layers.nationalBorders) map.removeLayer(layers.nationalBorders);
        if (layers.coastlines) map.removeLayer(layers.coastlines);

        let directWars = [], directAllies = [], indirectAllies = [], enemyAllies = [];
        if (selectedCountryId) {
            const target = nazioniGlobal.find(n => n._id === selectedCountryId);
            if (target) {
                directWars = target.warsWith || [];
                directAllies = target.allies || [];
                indirectAllies = getIndirectAllies(selectedCountryId);
                enemyAllies = getEnemyAllies(selectedCountryId);
            }
        }

        layers.regions = L.geoJson(topojson.feature(topoData, topoData.objects.regions), {
            style: (f) => {
                const cId = f.properties.countryId;
                const styleInfo = labelsData.find(l => l.properties && l.properties.countryId === cId);
                let color = styleInfo ? styleInfo.properties.strokeColor : COLORS.NEUTRAL_UNSELECTED;
                let opacity = 0.8;

                if (selectedCountryId) {
                    const isManualNap = customNaps.includes(cId);
                    if (cId === selectedCountryId) { color = COLORS.SELECTED; opacity = 1; } 
                    else if (isManualNap) { color = COLORS.NAP; opacity = 1; }
                    else if (directAllies.includes(cId)) { color = COLORS.ALLY_DIRECT; opacity = 1; }
                    else if (directWars.includes(cId)) { color = COLORS.WAR_DIRECT; opacity = 1; }
                    else if (enemyAllies.includes(cId) && indirectAllies.includes(cId) && isExtended) { color = COLORS.BORDERLINE; opacity = 1; }
                    else if (enemyAllies.includes(cId)) { color = COLORS.WAR_INDIRECT; opacity = 1; }
                    else if (indirectAllies.includes(cId) && isExtended) { color = COLORS.ALLY_INDIRECT; opacity = 1; }
                    else { color = COLORS.DEFAULT_LAND; opacity = 0.9; }
                }
                return { fillColor: color, fillOpacity: opacity, color: "rgba(0,0,0,0.4)", weight: 0.5 };
            },
            onEachFeature: (f, layer) => {
                layer.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    selectedCountryId = (selectedCountryId === f.properties.countryId) ? null : f.properties.countryId;
                    renderMap();
                });
            }
        }).addTo(map);

        layers.nationalBorders = L.geoJson(topojson.mesh(topoData, topoData.objects.regions, (a, b) => a !== b && a.properties.countryId !== b.properties.countryId), {
            style: { color: "rgba(255,255,255,0.6)", weight: 1.5, interactive: false }
        }).addTo(map);

        layers.coastlines = L.geoJson(topojson.mesh(topoData, topoData.objects.regions, (a, b) => a === b), {
            style: { color: "#ffffff", weight: 1, interactive: false }
        }).addTo(map);

        layers.labels.clearLayers();
        if (showLabels) {
            labelsData.forEach(l => {
                if (l.coordinates) {
                    L.marker([l.coordinates[1], l.coordinates[0]], {
                        icon: L.divIcon({ className: 'nation-label', html: `<span class="nation-name">${l.properties.countryName}</span>` }),
                        interactive: false
                    }).addTo(layers.labels);
                }
            });
        }
    }

    function popolaListe() {
        const datalist = document.getElementById('nazioniList');
        datalist.innerHTML = '';
        [...nazioniGlobal].sort((a,b) => a.name.localeCompare(b.name)).forEach(n => {
            const opt = document.createElement('option');
            opt.value = n.name;
            datalist.appendChild(opt);
        });
    }

    function aggiungiNap() {
        const val = document.getElementById('napInput').value;
        const found = nazioniGlobal.find(n => n.name === val);
        if (found && !customNaps.includes(found._id)) {
            customNaps.push(found._id);
            document.getElementById('napInput').value = ''; 
            aggiornaListaNap(); renderMap();
        }
    }

    function rimuoviNap(id) {
        customNaps = customNaps.filter(n => n !== id);
        aggiornaListaNap(); renderMap();
    }

    function aggiornaListaNap() {
        const container = document.getElementById('napList');
        container.innerHTML = "";
        customNaps.forEach(id => {
            const n = nazioniGlobal.find(x => x._id === id);
            if (n) container.innerHTML += `<div class="nap-item"><span>${n.name}</span> <span class="remove-nap" onclick="rimuoviNap('${id}')">✕</span></div>`;
        });
    }

    function cercaNazione() {
        const val = document.getElementById('cercaInput').value.toLowerCase().trim();
        const found = nazioniGlobal.find(n => n.name.toLowerCase() === val) || nazioniGlobal.find(n => n.name.toLowerCase().includes(val));
        if (found) { selectedCountryId = found._id; document.getElementById('cercaInput').value = found.name; renderMap(); }
    }

    function resetDiplomazia() {
        selectedCountryId = null; customNaps = []; 
        document.getElementById('cercaInput').value = '';
        document.getElementById('checkExtended').checked = false;
        aggiornaListaNap(); renderMap();
    }

    window.onload = init;
</script>
</body>
</html>
